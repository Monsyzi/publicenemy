<head>
  <meta charset="UTF-8" />

  <link rel="icon" href="https://file.garden/aT6vZ4PVCwXB1BNw/994f2c6ff2fc77fa65350b0ed08bbecd-removebg-preview.png" type="image/png">
  <title>/ Mnx </title>
  <style>
    html, body { 
      height: 100%; margin: 0; padding: 0; overflow-x: hidden; 
      background: url('https://file.garden/aT6vZ4PVCwXB1BNw/70f36214474e38f74c62996ff6740daf.gif') no-repeat center center / cover;
      background-attachment: fixed; 
      color: #fff; font-family: 'Space Mono', monospace; 
    }
    #intro-panel {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); font-size: 12px; color: #fff; cursor: pointer; transition: opacity 0.6s ease; z-index: 999;
      letter-spacing: 5px; font-family: 'Space Mono', monospace;
    }
    .intro-text { opacity: 0.9; }
    .content { 
      display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; 
      padding: 10px; text-align: center; 
    }
    .top-logo { width: 100px; height: auto; margin: 20px auto 15px; transition: transform 0.3s; }
    .top-logo:hover { transform: scale(1.1); }
    .main-title { 
      font-size: 26px; margin: 10px 0 10px; 
      background: linear-gradient(to right, #fcfcfc, #ffffff, #f9f9f9);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; 
      animation: infiniteGradient 6s linear infinite; letter-spacing: 2px;
      font-family: 'Space Mono', monospace;
    }

    /* Sub-text below profile picture */
    .sub-text {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 2px;
      margin: 12px 0 6px;
      font-family: 'Space Mono', monospace;
      max-width: 260px;
      line-height: 1.6;
    }

    .profile { position: relative; display: flex; flex-direction: column; align-items: center; margin: 20px auto 0; }
    .profile-pic { 
      width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(255,255,255,0.2); transition: transform 0.3s; cursor: pointer; 
    }
    .profile-pic:hover { transform: scale(1.1); }
    .status-dot { position: absolute; bottom: 8px; right: 8px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #000; }
    .status-online { background: #43b581; } .status-idle { background: #faa61a; } .status-dnd { background: #f04747; } .status-offline { background: #747f8d; }

    /* Bigger profile info popup */
    .profile-info { 
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-10px) scale(0.9);
      width: 300px; padding: 14px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #eee;
      box-shadow: 0 8px 25px rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: all 0.3s; font-size: 14px; text-align: left;
      font-family: 'Space Mono', monospace;
    }
    .profile:hover .profile-info { opacity: 1; transform: translateX(-50%) translateY(-15px) scale(1); pointer-events: auto; }
    .info-avatar { width: 48px; height: 48px; border-radius: 50%; float: left; margin-right: 12px; border: 2px solid rgba(255,255,255,0.2); }
    .name-row { display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 16px; font-family: 'Space Mono', monospace; }

    /* Spotify Widget */
    .spotify-widget {
      width: 280px;
      max-width: 95%;
      height: 80px;
      background: #000;
      border-radius: 12px;
      padding: 0 16px;
      margin: 20px auto;
      display: none;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      overflow: hidden;
      border: 1px solid #222;
    }
    .spotify-album {
      width: 56px; height: 56px; border-radius: 8px; overflow: hidden; flex-shrink: 0; margin-right: 14px;
    }
    .spotify-album img { width: 100%; height: 100%; object-fit: cover; }
    .spotify-main-info {
      flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: left; overflow: hidden;
      font-family: 'Space Mono', monospace;
    }
    .spotify-song-title {
      font-size: 13px; font-weight: bold; color: #fff; margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .spotify-song-artist {
      font-size: 11px; color: #bbb; margin: 2px 0 0 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .spotify-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .spotify-play-pause { font-size: 18px; color: #fff; cursor: pointer; opacity: 0.9; }
    .spotify-play-pause:hover { opacity: 1; transform: scale(1.1); }

    .blinking-notes { 
      font-size: 11px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.8); 
      animation: subtleBlink 2s infinite alternate; margin: 8px auto; display: block; max-width: 280px;
      font-family: 'Space Mono', monospace; letter-spacing: 1px;
    }
    @keyframes subtleBlink { 0% { opacity: 0.8; } 100% { opacity: 1; } }

    .custom-media { 
      width: 260px; max-width: 90%;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      margin: 12px auto;
      color: #ddd;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
    }

    .social-links {
      display: flex; justify-content: center; gap: 16px; margin: 12px auto 20px;
      flex-wrap: wrap; max-width: 300px;
    }
    .social-icon {
      width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center; transition: all 0.3s;
      text-decoration: none; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.12);
    }
    .social-icon svg { width: 22px; height: 22px; fill: #fff; }
    .social-icon:hover {
      transform: scale(1.15); background: rgba(255,255,255,0.15); box-shadow: 0 0 15px rgba(255,255,255,0.25);
    }



    .typing-caret { border-right: .12em solid #ff69b4; animation: blink-caret 800ms step-end infinite; }
    @keyframes infiniteGradient { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }
    @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #ff69b4; } }
  </style>
</head>

  <audio id="intro-audio" src="https://file.garden/acCjjUC7xVwvYa8G/MOOLAH%20-%20SCOOP%20DOGG%2C%20DAARTH.mp3" loop></audio>

  <script>
    const introPanel = document.getElementById("intro-panel");
    const content = document.querySelector(".content");
    const audio = document.getElementById("intro-audio");
    const profileContainer = document.getElementById("profile-container");
    const spotifyWidget = document.getElementById("spotify-widget");
    const blinkingNotes = document.getElementById("blinking-notes");
    const TITLE_TEXT = "@ Monsy";

    function typeWriter(el, text) {
      el.classList.add('typing-caret'); el.textContent = ''; let i = 0;
      const type = () => { if (i < text.length) { el.textContent += text.charAt(i); i++; setTimeout(type, 80); } else el.classList.remove('typing-caret'); };
      setTimeout(type, 600);
    }

    function formatTime(ms) {
      if (!ms || ms < 0) return "0:00";
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    introPanel.addEventListener("click", () => {
      audio.volume = 0; audio.play().catch(() => {});
      let fade = setInterval(() => { if (audio.volume < 0.6) audio.volume += 0.02; else clearInterval(fade); }, 80);
      introPanel.style.opacity = 0;
      setTimeout(() => { introPanel.style.display = "none"; content.style.display = "flex"; typeWriter(document.getElementById("main-title"), TITLE_TEXT); }, 700);
    });

    async function loadProfile() {
      try {
        const res = await fetch('https://api.lanyard.rest/v1/users/1461546126581960776');
        const { data, success } = await res.json();
        if (!success) return;

        const user = data.discord_user;
        const status = data.discord_status || 'offline';
        const statusClass = { online: 'status-online', idle: 'status-idle', dnd: 'status-dnd', offline: 'status-offline' }[status] || 'status-offline';

        const avatar = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}${user.avatar.startsWith('a_') ? '.gif' : '.png'}?size=512`
          : `https://cdn.discordapp.net/embed/avatars/${parseInt(user.discriminator || 0) % 5}.png`;

        let customStatus = '';
        let spotifyHTML = '';

        data.activities?.forEach(act => {
          if (act.type === 4) customStatus = act.state || '';
          if (act.type === 2 && act.timestamps?.start) {
            const albumArt = act.assets?.large_image 
              ? `https://i.scdn.co/image/${act.assets.large_image.split(':')[1] || ''}` 
              : 'https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg';

            spotifyHTML = `
              <div class="spotify-album">
                <img src="${albumArt}" alt="Album Art">
              </div>
              <div class="spotify-main-info">
                <div class="spotify-song-title">${act.details || 'Unknown Song'}</div>
                <div class="spotify-song-artist">${act.state || 'Unknown Artist'}</div>
              </div>
              <div class="spotify-controls">
                <div class="spotify-play-pause">⏸︎</div>
              </div>`;

            spotifyWidget.innerHTML = spotifyHTML;
            spotifyWidget.style.display = 'flex';
          }
        });

        if (customStatus) blinkingNotes.textContent = customStatus;

        profileContainer.innerHTML = `
          <img class="profile-pic" src="${avatar}" alt="${user.global_name || user.username}">
          <div class="status-dot ${statusClass}"></div>
          <div class="profile-info">
            <img src="${avatar}" class="info-avatar">
            <div class="name-row">
              <span>${user.global_name || user.username}</span>
              <span class="status-dot ${statusClass}"></span>
            </div>
            <div style="opacity:0.8; font-size:12px; font-family:'Space Mono',monospace;">@${user.username}</div>
            ${customStatus ? `<div style="margin-top:8px; opacity:0.9; font-size:12px; font-family:'Space Mono',monospace;">${customStatus}</div>` : ''}
          </div>`;
      } catch (e) { console.error(e); }
    }

    loadProfile();
    setInterval(loadProfile, 30000);

    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
      if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) || (e.ctrlKey && e.key === "U")) e.preventDefault();
    });
  </script>
